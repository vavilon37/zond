server {
    listen 8000 ssl;
    server_name zondvpn.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/zondvpn.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zondvpn.duckdns.org/privkey.pem;

    client_max_body_size 50M;

    location /sub {
        add_header announce "Не работает? Нажми кружок обновления. Подписка авто-обновляется. Пинг в HAPP не отражает реальную скорость — особенность Reality. Связь: @yodealer" always;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
